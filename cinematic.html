<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow, noarchive"> <title>Blendforge Cinematic</title>    <link rel="icon" href="Logo.png"> <style> html, body{ margin:0; padding:0; background:#000; height:100%; overflow:hidden; font-family: Helvetica, Arial, sans-serif; } /* smooth page fade */ body.fadeout{ animation:fadeout 1.2s forwards; } @keyframes fadeout{ to{ opacity:0; } } /* scene */ .scene{ position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; } /* spinning logo */ #blade{ width:320px; height:320px; object-fit:contain; filter: drop-shadow(0 0 28px rgba(255,255,255,0.25)); animation: spinup 3s ease-out forwards, spinfast 0.35s linear 3s infinite; } @keyframes spinup{ from{ transform:rotate(0deg); } to{ transform:rotate(900deg); } } @keyframes spinfast{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } } .slow{ animation: spindown 5s cubic-bezier(.2,.7,.2,1) forwards !important; } @keyframes spindown{ from{ transform:rotate(0deg); } to{ transform:rotate(540deg); } } /* particles */ .particle{ position:absolute; width:12px; height:12px; background:linear-gradient(135deg,#e6e6e6,#8c8c8c); border-radius:50%; box-shadow:0 0 8px rgba(255,255,255,.4); animation:fly 1.2s linear forwards; } @keyframes fly{ 0%{ transform:translate(var(--x),var(--y)) scale(1); opacity:1; } 100%{ transform:translate(0,0) scale(0); opacity:0; } } /* title */ #title{ position:absolute; bottom:28%; width:100%; text-align:center; color:white; font-size:52px; letter-spacing:6px; opacity:0; transition:opacity 2.2s ease; font-weight:300; } .show{ opacity:1 !important; } /* ENTER BUTTON */ #enter-btn{ position:absolute; bottom:16%; left:50%; transform:translateX(-50%); padding:14px 42px; border:2px solid white; background:transparent; color:white; font-size:15px; letter-spacing:3px; cursor:pointer; opacity:0; transition:all .35s ease; } #enter-btn:hover{ background:white; color:black; } .visible{ opacity:1 !important; } </style> </head> <body> <div class="scene"> <img id="blade" src="LogoInvert.png"> </div> <div id="title">BLENDFORGE APPLIANCES</div> <button id="enter-btn">ENTER BLENDFORGE</button> <script> /* particles */ function spawn(){ const p=document.createElement("div"); p.className="particle"; const x=(Math.random()*window.innerWidth - window.innerWidth/2)+"px"; const y=(Math.random()*window.innerHeight - window.innerHeight/2)+"px"; p.style.setProperty('--x',x); p.style.setProperty('--y',y); document.body.appendChild(p); setTimeout(()=>p.remove(),1200); } let interval=setInterval(spawn,90); /* slow blender */ setTimeout(()=>{ clearInterval(interval); document.getElementById("blade").classList.add("slow"); },7000); /* reveal title */ setTimeout(()=>{ document.getElementById("title").classList.add("show"); },10500); /* reveal enter button */ setTimeout(()=>{ document.getElementById("enter-btn").classList.add("visible"); },12000); /* transition to homepage */ document.getElementById("enter-btn").addEventListener("click",()=>{ document.body.classList.add("fadeout"); setTimeout(()=>{ window.location.href="index.html"; },1200); }); </script> </body> </html>
